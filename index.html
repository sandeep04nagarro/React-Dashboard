<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem("todo-app:theme");
          var prefersDark =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (saved === "dark" || (!saved && prefersDark)) {
            document.documentElement.setAttribute("data-theme", "dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <main class="app">
      <header class="app__header">
        <div class="app__heading">
          <h1 class="app__title">Todo App</h1>
          <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" aria-pressed="false">
            <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">☀</span>
            <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">☾</span>
          </button>
        </div>
        <p class="app__subtitle">Built with vanilla HTML, CSS & JS</p>
      </header>

      <form id="todo-form" class="todo-form" autocomplete="off">
        <input
          id="todo-input"
          class="todo-form__input"
          type="text"
          placeholder="What needs to be done?"
          aria-label="New todo"
          required
        />
        <select id="todo-priority" class="todo-form__select" aria-label="Priority">
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
        <select id="todo-category" class="todo-form__select" aria-label="Category">
          <option value="general" selected>General</option>
          <option value="work">Work</option>
          <option value="personal">Personal</option>
          <option value="shopping">Shopping</option>
          <option value="health">Health</option>
        </select>
        <input
          id="todo-due"
          class="todo-form__date"
          type="date"
          aria-label="Due date"
        />
        <button class="todo-form__add" type="submit">Add</button>
      </form>

      <div class="toolbar">
        <div class="toolbar__search">
          <input
            id="search-input"
            class="toolbar__search-input"
            type="search"
            placeholder="Search tasks..."
            aria-label="Search tasks"
          />
        </div>
        <div class="toolbar__controls">
          <label class="toolbar__field">
            <span class="toolbar__label">Priority</span>
            <select id="priority-filter" class="toolbar__select" aria-label="Filter by priority">
              <option value="all">All</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
          </label>
          <label class="toolbar__field">
            <span class="toolbar__label">Category</span>
            <select id="category-filter" class="toolbar__select" aria-label="Filter by category">
              <option value="all">All</option>
              <option value="general">General</option>
              <option value="work">Work</option>
              <option value="personal">Personal</option>
              <option value="shopping">Shopping</option>
              <option value="health">Health</option>
            </select>
          </label>
          <label class="toolbar__field">
            <span class="toolbar__label">Sort by</span>
            <select id="sort-select" class="toolbar__select" aria-label="Sort tasks">
              <option value="created">Newest first</option>
              <option value="created-asc">Oldest first</option>
              <option value="priority">Priority (high-low)</option>
              <option value="priority-asc">Priority (low-high)</option>
              <option value="due">Due date (soonest)</option>
              <option value="alpha">A-Z</option>
            </select>
          </label>
        </div>
      </div>

      <nav class="filters" aria-label="Filter todos">
        <button class="filters__btn is-active" data-filter="all" aria-selected="true">All</button>
        <button class="filters__btn" data-filter="active" aria-selected="false">Active</button>
        <button class="filters__btn" data-filter="completed" aria-selected="false">Completed</button>
        <button class="filters__btn" data-filter="favorites" aria-selected="false">Favorites</button>
        <button class="filters__btn" data-filter="pinned" aria-selected="false">Pinned</button>
      </nav>

      <ul id="todo-list" class="todo-list" aria-live="polite"></ul>

      <p id="empty-state" class="empty-state" role="status">No todos yet. Add one above!</p>

      <footer class="app__footer">
        <span id="items-left" class="app__count">0 items left</span>
        <button id="clear-completed" class="app__clear" type="button" disabled>Clear completed</button>
      </footer>
    </main>

    <template id="todo-item-template">
      <li class="todo-item">
        <div class="todo-item__main">
          <label class="todo-item__label">
            <input type="checkbox" class="todo-item__checkbox" />
            <span class="todo-item__text"></span>
            <span class="todo-item__meta">
              <span class="todo-item__badge todo-item__badge--priority"></span>
              <span class="todo-item__badge todo-item__badge--category"></span>
              <span class="todo-item__badge todo-item__badge--due"></span>
            </span>
          </label>
          <div class="todo-item__actions">
            <button class="todo-item__icon-btn todo-item__star" type="button" aria-pressed="false" title="Star">&#9734;</button>
            <button class="todo-item__icon-btn todo-item__pin" type="button" aria-pressed="false" title="Pin">&#128204;</button>
            <button class="todo-item__icon-btn todo-item__edit-btn" type="button" aria-label="Edit todo" title="Edit">&#9998;</button>
            <button class="todo-item__icon-btn todo-item__notes-toggle" type="button" aria-label="Toggle notes" title="Notes">&#9776;</button>
            <button class="todo-item__icon-btn todo-item__duplicate" type="button" aria-label="Duplicate todo" title="Duplicate">&#10697;</button>
            <button class="todo-item__icon-btn todo-item__delete" type="button" aria-label="Delete todo" title="Delete">&times;</button>
          </div>
        </div>

        <div class="todo-item__meta">
          <span class="todo-item__created"></span>
          <span class="todo-item__completed"></span>
        </div>

        <p class="todo-item__notes"></p>

        <div class="todo-item__edit" role="group" aria-label="Edit todo">
          <input type="text" class="todo-item__edit-input" aria-label="Todo text" />
          <textarea class="todo-item__edit-notes" rows="2" placeholder="Notes / description"></textarea>
          <div class="todo-item__edit-actions">
            <button class="todo-item__save" type="button">Save</button>
            <button class="todo-item__cancel" type="button">Cancel</button>
          </div>
        </div>
      </li>
    </template>

    <script src="script.js"></script>
  </body>
</html>
